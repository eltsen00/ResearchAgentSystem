name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: ubuntu
            arch: amd64
            runner: ubuntu-latest
            python-version: '3.10'
          - os: ubuntu
            arch: arm64
            runner: ubuntu-24.04-arm
            python-version: '3.10'
          - os: macos
            arch: arm64
            runner: macos-latest
            python-version: '3.10'
          - os: windows
            arch: amd64
            runner: windows-latest
            python-version: '3.10'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install langchain langchain-openai langgraph chromadb sentence-transformers ddgs certifi pyinstaller

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows'
        run: |
          pyinstaller --onedir --name ResearchAgent `
            --add-data "agents;agents" `
            --add-data "memory;memory" `
            --add-data "tools;tools" `
            --add-data "config.py;." `
            --add-data "state.py;." `
            --add-data "graph.py;." `
            --add-data "utils.py;." `
            --exclude-module torchvision `
            --exclude-module torchaudio `
            --exclude-module torch.distributed `
            --exclude-module PIL `
            --exclude-module matplotlib `
            --exclude-module scipy `
            --exclude-module pandas `
            --hidden-import chromadb `
            --hidden-import chromadb.utils.embedding_functions `
            --hidden-import sentence_transformers `
            --hidden-import langchain_openai `
            --hidden-import langgraph `
            --hidden-import langgraph.checkpoint.memory `
            --hidden-import ddgs `
            --hidden-import certifi `
            main.py
        shell: pwsh

      - name: Build with PyInstaller (Unix)
        if: matrix.os != 'windows'
        run: |
          pyinstaller --onedir --name ResearchAgent \
            --add-data "agents:agents" \
            --add-data "memory:memory" \
            --add-data "tools:tools" \
            --add-data "config.py:." \
            --add-data "state.py:." \
            --add-data "graph.py:." \
            --add-data "utils.py:." \
            --exclude-module torchvision \
            --exclude-module torchaudio \
            --exclude-module torch.distributed \
            --exclude-module PIL \
            --exclude-module matplotlib \
            --exclude-module scipy \
            --exclude-module pandas \
            --hidden-import chromadb \
            --hidden-import chromadb.utils.embedding_functions \
            --hidden-import sentence_transformers \
            --hidden-import langchain_openai \
            --hidden-import langgraph \
            --hidden-import langgraph.checkpoint.memory \
            --hidden-import ddgs \
            --hidden-import certifi \
            main.py

      - name: Package (Windows)
        if: matrix.os == 'windows'
        run: Compress-Archive -Path dist\ResearchAgent -DestinationPath ResearchAgent-${{ matrix.os }}-${{ matrix.arch }}.zip
        shell: pwsh

      - name: Package (Unix)
        if: matrix.os != 'windows'
        run: cd dist && tar -czf ../ResearchAgent-${{ matrix.os }}-${{ matrix.arch }}.tar.gz ResearchAgent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ResearchAgent-${{ matrix.os }}-${{ matrix.arch }}
          path: ResearchAgent-${{ matrix.os }}-${{ matrix.arch }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ResearchAgent-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ResearchAgent-*.zip
            ResearchAgent-*.tar.gz
          generate_release_notes: true
